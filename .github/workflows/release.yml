name: Package and Release WoW Addon

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create/update GitHub releases and upload assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history is required for changelog generation and versioning

      - name: Package WoW Addon
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}

      - name: Upload Packaged Addon Artifact
        uses: actions/upload-artifact@v4
        with:
          path: .release/*.zip
          include-hidden-files: true
          if-no-files-found: error
